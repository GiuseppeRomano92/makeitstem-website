name: Sync publications from ORCID

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run ORCID sync
        run: python scripts/sync_orcid.py

      - name: Commit changes if publications.json was updated
        run: |
          if git diff --quiet -- publications.json; then
            echo "No new publications found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -m "Auto-sync: add new publication(s) found on ORCID"
          git push
